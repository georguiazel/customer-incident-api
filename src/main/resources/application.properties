spring.application.name=customer-incident-api
server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:${DATABASE_URL:jdbc:postgresql://db:5432/incidents_db}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${DATABASE_USERNAME:postgres}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${DATABASE_PASSWORD:postgres}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE